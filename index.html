<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💳 雲端信用卡繳費管理系統</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-bg { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; }
    </style>
</head>
<body>
<div class="container my-5" style="max-width: 950px;">
    
    <!-- 頂部儀表板 -->
    <div class="header-bg text-center">
        <h1 class="h3 mb-2">💳 雲端信用卡繳費管理系統</h1>
        <p class="mb-0 fs-5">當月未繳費總計：<span id="totalUnpaid" class="fw-bold text-warning">0</span> 元</p>
    </div>

    <div class="row g-4">
        <!-- 左側：輸入表單區 -->
        <div class="col-md-5">
            <!-- 功能一：新增信用卡 -->
            <div class="card card-custom p-4 mb-4">
                <h5 class="card-title fw-bold text-primary mb-3">➕ 新增信用卡</h5>
                <form id="cardForm">
                    <div class="mb-2">
                        <input type="text" id="cardName" class="form-control form-control-sm" placeholder="卡片名稱 (如: 玫瑰卡)" required>
                    </div>
                    <div class="mb-2">
                        <input type="text" id="bankName" class="form-control form-control-sm" placeholder="銀行名稱 (如: 台新)" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col">
                            <input type="number" id="billingDate" class="form-control form-control-sm" placeholder="結帳日 (1-31)" min="1" max="31" required>
                        </div>
                        <div class="col">
                            <input type="number" id="dueDate" class="form-control form-control-sm" placeholder="截止日 (1-31)" min="1" max="31" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-sm w-100">儲存卡片</button>
                </form>
            </div>

            <!-- 功能二：登錄新帳單 -->
            <div class="card card-custom p-4">
                <h5 class="card-title fw-bold text-success mb-3">💵 登錄新帳單</h5>
                <form id="billForm">
                    <div class="mb-2">
                        <label class="form-label small text-muted mb-1">選擇信用卡</label>
                        <select id="billCardId" class="form-select form-select-sm" required>
                            <option value="">-- 請先新增信用卡 --</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small text-muted mb-1">帳單月份</label>
                        <input type="month" id="billingMonth" class="form-control form-control-sm" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted mb-1">帳單金額</label>
                        <input type="number" id="billAmount" class="form-control form-control-sm" placeholder="請輸入金額" min="0" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100">登錄帳單</button>
                </form>
            </div>
        </div>

        <!-- 右側：資料庫數據顯示區 -->
        <div class="col-md-7">
            <!-- 信用卡清單 -->
            <div class="card card-custom p-4 mb-4">
                <h5 class="card-title fw-bold text-dark mb-3">📋 我的信用卡庫</h5>
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead class="table-light">
                            <tr><th>ID</th><th>卡片名稱</th><th>銀行</th><th>結帳/截止日</th><th>操作</th></tr>
                        </thead>
                        <tbody id="cardTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 未繳費帳單明細 -->
            <div class="card card-custom p-4">
                <h5 class="card-title fw-bold text-dark mb-3">🔔 未繳費帳單明細</h5>
                <div class="table-responsive">
                    <table class="table table-hover table-sm align-middle">
                        <thead class="table-light">
                            <tr><th>卡片</th><th>帳單月份</th><th>金額</th><th>操作</th></tr>
                        </thead>
                        <tbody id="unpaidTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 核心資料庫管理（使用瀏覽器內建 LocalStorage 替代 SQLite）
    let db = {
        cards: JSON.parse(localStorage.getItem('cc_cards')) || [],
        bills: JSON.parse(localStorage.getItem('cc_bills')) || []
    };

    function saveDB() {
        localStorage.setItem('cc_cards', JSON.stringify(db.cards));
        localStorage.setItem('cc_bills', JSON.stringify(db.bills));
        renderDashboard();
    }

    // 渲染整個網頁畫面與數據計算
    function renderDashboard() {
        // 1. 更新信用卡下拉選單與表格
        const cardSelect = document.getElementById('billCardId');
        const cardTbody = document.getElementById('cardTableBody');
        
        cardSelect.innerHTML = '<option value="">-- 請選擇信用卡 --</option>';
        if (db.cards.length === 0) {
            cardTbody.innerHTML = '<tr><td colspan="5" class="text-muted text-center py-2">尚未建立卡片</td></tr>';
        } else {
            cardTbody.innerHTML = db.cards.map(c => `
                <tr>
                    <td><code>#${c.id}</code></td>
                    <td><strong>${c.card_name}</strong></td>
                    <td>${c.bank_name}</td>
                    <td>${c.billing_date}日 / ${c.due_date}日</td>
                    <td><button class="btn btn-link text-danger btn-sm p-0" onclick="deleteCard(${c.id})">刪除</button></td>
                </tr>
            `).join('');
            
            db.cards.forEach(c => {
                cardSelect.innerHTML += `<option value="${c.id}">${c.card_name} (${c.bank_name})</option>`;
            });
        }

        // 2. 更新未繳費帳單明細與總金額計算
        const unpaidTbody = document.getElementById('unpaidTableBody');
        let totalUnpaid = 0;
        const unpaidBills = db.bills.filter(b => b.is_paid === 0);

        if (unpaidBills.length === 0) {
            unpaidTbody.innerHTML = '<tr><td colspan="4" class="text-muted text-center py-3">🎉 所有帳單皆已繳清！</td></tr>';
        } else {
            unpaidTbody.innerHTML = unpaidBills.map(b => {
                const card = db.cards.find(c => c.id === b.card_id) || { card_name: '未知卡片' };
                totalUnpaid += b.amount;
                return `
                    <tr>
                        <td><strong>${card.card_name}</strong></td>
                        <td><span class="badge bg-secondary">${b.billing_month}</span></td>
                        <td class="text-danger fw-bold">${b.amount.toLocaleString()} 元</td>
                        <td><button class="btn btn-outline-success btn-xs py-0 px-2" onclick="payBill(${b.id})">確認繳款</button></td>
                    </tr>
                `;
            }).join('');
        }
        document.getElementById('totalUnpaid').innerText = totalUnpaid.toLocaleString();
    }

    // 表單事件：新增信用卡
    document.getElementById('cardForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newCard = {
            id: Date.now(), // 用時間戳當作唯一 ID
            card_name: document.getElementById('cardName').value,
            bank_name: document.getElementById('bankName').value,
            billing_date: parseInt(document.getElementById('billingDate').value),
            due_date: parseInt(document.getElementById('dueDate').value)
        };
        db.cards.push(newCard);
        document.getElementById('cardForm').reset();
        saveDB();
    });

    // 表單事件：登錄新帳單
    document.getElementById('billForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newBill = {
            id: Date.now(),
            card_id: parseInt(document.getElementById('billCardId').value),
            billing_month: document.getElementById('billingMonth').value,
            amount: parseFloat(document.getElementById('billAmount').value),
            is_paid: 0
        };
        db.bills.push(newBill);
        document.getElementById('billForm').reset();
        saveDB();
    });

    // 功能：確認繳款
    window.payBill = function(billId) {
        const bill = db.bills.find(b => b.id === billId);
        if (bill) {
            bill.is_paid = 1;
            saveDB();
        }
    };

    // 功能：刪除信用卡
    window.deleteCard = function(cardId) {
        if (confirm('確定要刪除這張信用卡嗎？相關帳單也會一併刪除。')) {
            db.cards = db.cards.filter(c => c.id !== cardId);
            db.bills = db.bills.filter(b => b.card_id !== cardId);
            saveDB();
        }
    };

    // 首次載入初始化
    window.onload = renderDashboard;
</script>
</body>
</html>
